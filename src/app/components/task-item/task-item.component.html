<div class="task-item">
  <button
    type="button"
    class="task-item__checkbox"
    (click)="handleToggle()"
    aria-label="Toggle task"
  >
    <span
      class="task-item__check-outer"
      [class.task-item__check-outer--done]="task().completed"
    >
      @if (task().completed) {
        <span class="task-item__check-inner"></span>
      }
    </span>
  </button>

  <button type="button" class="task-item__body" (click)="handleToggle()">
    <span
      class="task-item__title"
      [class.task-item__title--completed]="task().completed"
    >
      {{ task().title }}
    </span>
    <span class="task-item__date">Added {{ formatDate(task().createdAt) }}</span>
  </button>

  <button
    type="button"
    class="task-item__delete"
    (click)="handleDelete()"
    aria-label="Delete task"
  >
    ✕
  </button>
</div>
