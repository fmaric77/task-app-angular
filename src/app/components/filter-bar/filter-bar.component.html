<div class="filter-bar">
  <div class="filter-bar__tabs">
    @for (f of filters; track f.value) {
      <button
        type="button"
        class="filter-bar__tab"
        [class.filter-bar__tab--active]="activeFilter() === f.value"
        (click)="onFilterChange.emit(f.value)"
      >
        {{ f.label }}
      </button>
    }
  </div>

  @if (completedCount() > 0) {
    <button type="button" class="filter-bar__clear" (click)="handleClear()">
      Clear completed
    </button>
  }
</div>
