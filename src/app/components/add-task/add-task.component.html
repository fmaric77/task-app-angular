<div class="add-task">
  <input
    class="add-task__input"
    type="text"
    placeholder="Add a new task..."
    [(ngModel)]="value"
    (keydown.enter)="handleAdd()"
    autocomplete="off"
  />
  <button
    class="add-task__button"
    type="button"
    [class.add-task__button--disabled]="!value.trim()"
    [disabled]="!value.trim()"
    (click)="handleAdd()"
  >
    Add
  </button>
</div>
